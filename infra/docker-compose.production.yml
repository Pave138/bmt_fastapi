services:
  db:
    container_name: bmt-shop_db
    image: postgres:17-alpine
    restart: always
    env_file:
     - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/pgsql/data

  redis:
    container_name: bmt-shop_redis
    restart: always
    image: redis:7
    depends_on:
      - db

  backend:
    image: pave138/bmt-shop_backend
    container_name: bmt-shop_backend
    restart: always

    env_file:
      - .env

    depends_on:
      - redis

  gateway:
    container_name: bmt-shop_proxy
    image: pave138/bmt-shop_proxy
    restart: always
    ports:
      - "222:80"
    depends_on:
      - backend

volumes:
  pg_data: