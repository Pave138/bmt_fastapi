name: bmt

services:
  db:
    container_name: bmt-shop_db
    image: postgres:17-alpine
    restart: always
    env_file:
     - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/pgsql/data

  redis:
    container_name: bmt-shop_redis
    restart: always
    image: redis:7
    depends_on:
      - db

  minio:
    image: minio/minio
    container_name: minio
    restart: unless-stopped
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-password123}"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createBuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/products;
      mc anonymous set download local/products;
      exit 0;
      "

  backend:
    image: pave138/bmt-shop_backend
    container_name: bmt-shop_backend
    restart: always

    env_file:
      - .env

    depends_on:
      - createBuckets

  gateway:
    container_name: bmt-shop_proxy
    image: pave138/bmt-shop_proxy
    restart: always
    ports:
      - "222:80"
    depends_on:
      - backend

volumes:
  pg_data:
  minio_data: